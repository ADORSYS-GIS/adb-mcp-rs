name: codeql

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: arc-runner-set-sky-frontend
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v4
